name: AutoPickup
version: '1.0.0'
main: com.autopickup.AutoPickupPlugin
api-version: '1.21'
author: AutoPickup
description: Auto-pickup block drops into player inventory when mining

commands:
  autopickup:
    description: Toggle auto-pickup or open the filter mode GUI
    usage: /<command> [on|off|mode|reload]
    aliases: [ap]

permissions:
  autopickup.use:
    description: Allow toggling auto-pickup on/off
    default: true
  autopickup.mode:
    description: Allow opening the filter GUI (/autopickup mode)
    default: true
  autopickup.reload:
    description: Allow reloading plugin configuration
    default: op
